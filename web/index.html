<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TeaShop — herbata dopasowana do Twojego nastroju. Zrób quiz, odkryj kolekcje i parz świadomie."
    />
    <title>TeaShop — herbata dopasowana do nastroju</title>
    <script>
      // Decode path encoded by 404.html redirect.
      (function () {
        var s = window.location.search;
        if (s[1] === 'p' && s[2] === '=') {
          var decoded = s.slice(1).split('&').map(function (part) {
            return part.replace(/~and~/g, '&');
          });
          var path = decoded[0].slice(2); // strip "p="
          var query = decoded[1] ? '?' + decoded[1].slice(2) : ''; // strip "q="
          window.history.replaceState(
            null, null,
            window.location.pathname.split('/').slice(0, 2).join('/') + path + query + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
